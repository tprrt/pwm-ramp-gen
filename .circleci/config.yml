version: 2.1

orbs:
  sonarcloud: sonarsource/sonarcloud@2.0.0

executors:
  docker-riotbuild:
    docker:
      - image: riot/riotbuild
    resource_class: medium

commands:
  checkout-with-submodules:
    description: "Checkout code and restore/update submodules with caching"
    steps:
      - checkout
      - restore_cache:
          keys:
            - submodules-v1-{{ checksum ".gitmodules" }}
            - submodules-v1-
      - run:
          name: Checkout git submodules
          command: |
            git submodule sync
            git submodule update --init --recursive
      - save_cache:
          key: submodules-v1-{{ checksum ".gitmodules" }}
          paths:
            - .git/modules

jobs:
  build-and-analyze:
    executor: docker-riotbuild
    steps:
      - checkout-with-submodules
      - restore_cache:
          keys:
            - cargo-v1-{{ checksum "Cargo.toml" }}
            - cargo-v1-
      - run:
          name: Install Clippy
          command: rustup component add clippy
      - run:
          name: Generate Clippy report
          command: |
            cargo clippy --message-format=json > clippy-report.json || true
      - run:
          name: Build the application
          command: make
      - save_cache:
          key: cargo-v1-{{ checksum "Cargo.toml" }}
          paths:
            - ~/.cargo/registry
      - sonarcloud/scan
      - store_artifacts:
          path: bin

  build:
    executor: docker-riotbuild
    parameters:
      board:
        type: string
    steps:
      - checkout-with-submodules
      - run:
          name: Build for << parameters.board >>
          command: |
            make BOARD=<< parameters.board >>
      - store_artifacts:
          path: bin
          destination: << parameters.board >>

workflows:
  commit-build:
    jobs:
      - build-and-analyze:
          context:
            - sonarcloud.io
          filters:
            branches:
              ignore:
                - gh-pages
      - build:
          name: build-nucleo-f746zg
          board: nucleo-f746zg
          filters:
            branches:
              ignore:
                - gh-pages

  weekly-build:
    triggers:
      - schedule:
          cron: "0 0 * * 0"
          filters:
            branches:
              only:
                - master
    jobs:
      - build-and-analyze:
          context:
            - sonarcloud.io
      - build:
          name: build-nucleo-f746zg
          board: nucleo-f746zg
