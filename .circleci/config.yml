version: 2.1
orbs:
  sonarcloud: sonarsource/sonarcloud@2.0.0
executors:
  docker-riotbuild:
    docker:
      - image: riot/riotbuild
    resource_class: medium
jobs:
  build-and-analyze:
    executor: docker-riotbuild
    steps:
      - checkout
      - run:
          name: Checkout git submodules
          command: |
            git submodule sync
            git submodule update --init --recursive
      - run:
          name: Install the SonarCloud scanner wrapper
          command: |
            wget https://sonarcloud.io/static/cpp/build-wrapper-linux-x86.zip
            unzip build-wrapper-linux-x86.zip
            cp build-wrapper-linux-x86/libinterceptor-x86_64.so build-wrapper-linux-x86/libinterceptor-haswell.so
      - run:
          name: Build the application with build-wrapper
          command: |
            ./build-wrapper-linux-x86/build-wrapper-linux-x86-64 --out-dir bin make
      - sonarcloud/scan
      - store_artifacts:
          path: bin

  build:
    executor: docker-riotbuild
    parameters:
      board:
        type: string
    steps:
      - checkout
      - run:
          name: Checkout git submodules
          command: |
            git submodule sync
            git submodule update --init --recursive
      - run:
          name: Build for << parameters.board >>
          command: |
            make BOARD=<< parameters.board >>
      - store_artifacts:
          path: bin
          destination: << parameters.board >>
workflows:
  version: 2
  commit-build:
    jobs:
      - build-and-analyze:
          context:
            - sonarcloud.io
          filters:
            branches:
              ignore:
                - gh-pages
      - build:
          name: build-arduino-leonardo
          board: arduino-leonardo
          filters:
            branches:
              ignore:
                - gh-pages

  weekly-build:
    triggers:
      - schedule:
          cron: "0 0 * * 0"
          filters:
            branches:
              only:
                - master
    jobs:
      - build-and-analyze:
          context:
            - sonarcloud.io
      - build:
          name: build-arduino-leonardo
          board: arduino-leonardo
